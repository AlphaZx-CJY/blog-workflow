name: Publish Blog to GitHub Pages

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'
      posts-path:
        description: 'Path to markdown posts directory (relative to repository root)'
        required: false
        type: string
        default: '.'
      config-path:
        description: 'Path to blog config file (relative to repository root)'
        required: false
        type: string
        default: 'blog.config.yml'
      blog-generator-version:
        description: 'Version of blog-generator to use (branch, tag, or commit)'
        required: false
        type: string
        default: 'main'
    secrets:
      GH_TOKEN:
        description: 'GitHub token for deployment'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout user repository
        uses: actions/checkout@v4
        with:
          path: user-content

      - name: Checkout blog-generator
        uses: actions/checkout@v4
        with:
          repository: AlphaZx-CJY/blog-generator
          ref: ${{ inputs.blog-generator-version }}
          path: blog-generator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: blog-generator/package-lock.json

      - name: Install dependencies
        working-directory: blog-generator
        run: npm ci

      - name: Copy posts to blog-generator
        run: |
          # Create posts directory
          mkdir -p blog-generator/content/posts
          
          # Remove sample posts from blog-generator (keep only user's posts)
          rm -f blog-generator/content/posts/*.md
          
          # Find and copy all .md files from user repository
          POSTS_PATH="user-content/${{ inputs.posts-path }}"
          
          if [ -d "$POSTS_PATH" ]; then
            echo "Looking for markdown files in: $POSTS_PATH"
            
            # Copy all .md files, excluding hidden directories and common non-content directories
            find "$POSTS_PATH" -type f -name "*.md" \
              ! -path "*/node_modules/*" \
              ! -path "*/.git/*" \
              ! -path "*/.github/*" \
              ! -path "*/dist/*" \
              ! -path "*/blog-generator/*" \
              -exec cp {} blog-generator/content/posts/ \;
            
            echo "Copied markdown files:"
            ls -la blog-generator/content/posts/
          else
            echo "Warning: Posts path not found: $POSTS_PATH"
          fi

      - name: Copy blog config
        run: |
          CONFIG_FILE="user-content/${{ inputs.config-path }}"
          
          if [ -f "$CONFIG_FILE" ]; then
            echo "Found blog config at: $CONFIG_FILE"
            cp "$CONFIG_FILE" blog-generator/content/blog.config.yml
          else
            echo "No blog config found at: $CONFIG_FILE"
            echo "Using default configuration"
          fi

      - name: Build TypeScript
        working-directory: blog-generator
        run: npm run build:ts

      - name: Build blog
        working-directory: blog-generator
        run: node scripts/build.js

      - name: Copy static assets
        run: |
          # Copy any images or other static assets from user repository
          if [ -d "user-content/images" ]; then
            echo "Copying images directory..."
            cp -r user-content/images blog-generator/dist/
          fi
          
          # Copy any other common asset directories
          for dir in assets static public; do
            if [ -d "user-content/$dir" ]; then
              echo "Copying $dir directory..."
              cp -r "user-content/$dir" blog-generator/dist/
            fi
          done

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blog-generator/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
