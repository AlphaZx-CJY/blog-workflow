# 示例：在您的项目中使用此 workflow
# 文件路径: .github/workflows/deploy.yml

name: Deploy Blog

on:
  # 每次推送到 main 分支时触发部署
  push:
    branches: [main]
  
  # 允许手动触发部署
  workflow_dispatch:

# 设置权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保同时只有一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # 使用可复用的 workflow
    uses: AlphaZx-CJY/blog-workflow/.github/workflows/publish-blog.yml@main
    
    # 可选：自定义参数
    # with:
    #   node-version: '20'
    #   posts-path: 'posts'
    #   config-path: 'blog.config.yml'
    #   blog-generator-version: 'main'
    
    # 必须提供 GitHub Token
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
