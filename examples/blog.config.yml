# 博客配置文件
# 所有配置项都是可选的，不配置的项目不会显示

# 博客标题（可选，默认 "My Blog"）
title: "我的博客"

# 关于我部分（可选）
about:
  avatar: "/images/avatar.png"  # 头像路径（可选）
  description: "热爱技术的开发者，分享编程心得与技术思考。"

# 友链列表（可选）
friends:
  - name: "GitHub"
    url: "https://github.com"
  - name: "Stack Overflow"
    url: "https://stackoverflow.com"
  - name: "MDN"
    url: "https://developer.mozilla.org"

# 联系方式（可选）
social:
  github: "https://github.com/username"
  email: "email@example.com"
  twitter: "https://twitter.com/username"
  rss: "/feed.xml"

# 评论系统（可选）
# 目前支持 giscus（基于 GitHub Discussions）
# 配置步骤：
# 1. 确保仓库已开启 Discussions
# 2. 访问 https://giscus.app 生成配置
# 3. 将配置填入下方
comments:
  provider: "giscus"
  repo: "username/blog-comments"
  repoId: "R_kgDOxxxxxx"
  category: "Announcements"
  categoryId: "DIC_kwDOxxxxxx"
  mapping: "pathname"
  reactionsEnabled: true
  strict: false
